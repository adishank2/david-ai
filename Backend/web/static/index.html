<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>David AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Tokens ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a12;
      --surface:     #12121e;
      --surface2:    #1a1a2e;
      --border:      rgba(255,255,255,.07);
      --accent:      #6c63ff;
      --accent2:     #a78bfa;
      --green:       #00e5a0;
      --user-bg:     #1e1848;
      --david-bg:    #16213e;
      --text:        #e8e8f0;
      --muted:       #6b6b8a;
      --danger:      #ff4d6d;
      --radius:      18px;
      --font:        'Inter', system-ui, sans-serif;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(108,99,255,.15) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 80% 90%, rgba(0,229,160,.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── App Shell ─────────────────────────────────── */
    .app {
      position: relative;
      z-index: 1;
      width: min(480px, 96vw);
      height: min(760px, 95vh);
      background: rgba(18,18,30,.85);
      border: 1px solid var(--border);
      border-radius: 28px;
      backdrop-filter: blur(24px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(108,99,255,.12),
        0 40px 80px rgba(0,0,0,.6);
    }

    /* ── Header ────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      box-shadow: 0 0 18px rgba(108,99,255,.45);
      flex-shrink: 0;
    }

    .header-info { flex: 1; }
    .header-info h1 { font-size: 15px; font-weight: 600; letter-spacing: .02em; }
    .header-info p  { font-size: 11px; color: var(--muted); margin-top: 1px; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .4s, box-shadow .4s;
    }
    .status-dot.ready     { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.listening { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse-dot 1s ease-in-out infinite; }
    .status-dot.processing{ background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
    .status-dot.speaking  { background: #f472b6; box-shadow: 0 0 8px #f472b6; }
    .status-dot.error     { background: var(--danger); }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .6; transform: scale(1.4); }
    }

    /* ── Status Bar ────────────────────────────────── */
    #status-bar {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 24px;
      background: rgba(0,0,0,.2);
      border-bottom: 1px solid var(--border);
      transition: color .3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Waveform ─────────────────────────────────── */
    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 18px;
      opacity: 0;
      transition: opacity .3s;
    }
    .waveform.active { opacity: 1; }
    .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      height: 4px;
      animation: wave 0.8s ease-in-out infinite;
    }
    .bar:nth-child(1) { animation-delay: 0s; }
    .bar:nth-child(2) { animation-delay: .1s; }
    .bar:nth-child(3) { animation-delay: .2s; }
    .bar:nth-child(4) { animation-delay: .1s; }
    .bar:nth-child(5) { animation-delay: 0s; }

    @keyframes wave {
      0%, 100% { height: 4px; }
      50%       { height: 16px; }
    }

    /* ── Chat Area ─────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Bubble base */
    .bubble {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 14px;
      animation: pop-in .25s cubic-bezier(.34,1.56,.64,1) both;
      position: relative;
    }

    @keyframes pop-in {
      from { opacity: 0; transform: scale(.92) translateY(6px); }
      to   { opacity: 1; transform: scale(1)  translateY(0);    }
    }

    .bubble.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #2e235c, #1e1848);
      border: 1px solid rgba(108,99,255,.3);
      border-bottom-right-radius: 5px;
      color: #d4d0f0;
    }

    .bubble.david {
      align-self: flex-start;
      background: linear-gradient(135deg, #14213d, #0f1829);
      border: 1px solid rgba(0,229,160,.15);
      border-bottom-left-radius: 5px;
    }

    .bubble .sender {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 5px;
      opacity: .55;
    }

    /* Typing indicator bubble */
    .bubble.typing {
      padding: 14px 18px;
    }
    .typing-dots { display: flex; gap: 5px; align-items: center; }
    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: .25; transform: scale(.8); }
      40%            { opacity: 1;   transform: scale(1);  }
    }

    /* ── Input Area ────────────────────────────────── */
    .input-area {
      padding: 14px 16px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(0,0,0,.25);
    }

    #text-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      resize: none;
      height: 46px;
      line-height: 1.4;
    }
    #text-input:focus {
      border-color: rgba(108,99,255,.5);
      box-shadow: 0 0 0 3px rgba(108,99,255,.12);
    }
    #text-input::placeholder { color: var(--muted); }

    .btn {
      width: 46px; height: 46px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      transition: transform .15s, opacity .15s, box-shadow .2s;
      flex-shrink: 0;
    }
    .btn:active { transform: scale(.9); }

    #send-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 14px rgba(108,99,255,.4);
    }
    #send-btn:hover { box-shadow: 0 6px 20px rgba(108,99,255,.6); }

    #mic-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      transition: background .2s, color .2s, border-color .2s, box-shadow .2s;
    }
    #mic-btn.active {
      background: rgba(108,99,255,.15);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 14px rgba(108,99,255,.3);
      animation: mic-pulse 1.5s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%,100% { box-shadow: 0 0 14px rgba(108,99,255,.3); }
      50%      { box-shadow: 0 0 28px rgba(108,99,255,.6); }
    }

    /* ── Welcome card ──────────────────────────────── */
    .welcome {
      margin: auto;
      text-align: center;
      padding: 24px;
      animation: fade-in .6s both;
    }
    .welcome .icon { font-size: 48px; margin-bottom: 12px; }
    .welcome h2 { font-size: 20px; font-weight: 600; }
    .welcome p  { font-size: 13px; color: var(--muted); margin-top: 6px; line-height: 1.6; }
    @keyframes fade-in { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: none; } }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">🤖</div>
    <div class="header-info">
      <h1>David AI</h1>
      <p>Local-first personal assistant</p>
    </div>
    <div class="status-dot" id="dot"></div>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <div class="waveform" id="waveform">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>
    <span id="status-text">Connecting…</span>
  </div>

  <!-- Chat -->
  <div id="chat">
    <div class="welcome">
      <div class="icon">✨</div>
      <h2>Hey, I'm David</h2>
      <p>Your local AI assistant.<br/>Type a message or use the mic button to speak.</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <button class="btn" id="mic-btn" title="Voice input">🎙️</button>
    <input id="text-input" type="text" placeholder="Ask David anything…" autocomplete="off" />
    <button class="btn" id="send-btn" title="Send">➤</button>
  </div>

</div>

<script>
// ── WebSocket ─────────────────────────────────────
const WS_URL  = `ws://${location.host}/ws`;
const chat    = document.getElementById('chat');
const dot     = document.getElementById('dot');
const statusT = document.getElementById('status-text');
const waveform= document.getElementById('waveform');
const input   = document.getElementById('text-input');
const sendBtn = document.getElementById('send-btn');
const micBtn  = document.getElementById('mic-btn');

let ws, typingBubble = null;
let welcomeRemoved = false;

function removeWelcome() {
  if (welcomeRemoved) return;
  const w = chat.querySelector('.welcome');
  if (w) { w.remove(); welcomeRemoved = true; }
}

// ── Status helper ────────────────────────────────
const STATUS_MAP = {
  'listening':      { cls: 'listening',  text: 'Listening…' },
  'processing':     { cls: 'processing', text: 'Processing…' },
  'speaking':       { cls: 'speaking',   text: 'Speaking…'  },
  'ready':          { cls: 'ready',      text: 'Ready'       },
  'connected':      { cls: 'ready',      text: 'Connected'   },
  'initializing':   { cls: 'processing', text: 'Initializing…' },
  'loading plugins':{ cls: 'processing', text: 'Loading plugins…'},
  'loading ai model':{ cls:'processing', text: 'Loading AI model…'},
};

function setStatus(raw) {
  const key = raw.toLowerCase().trim();
  const match = Object.entries(STATUS_MAP).find(([k]) => key.startsWith(k));
  const { cls, text } = match ? match[1] : { cls: '', text: raw };

  statusT.textContent = text || raw;
  dot.className = 'status-dot' + (cls ? ` ${cls}` : '');
  waveform.className = 'waveform' + (cls === 'listening' ? ' active' : '');
}

// ── Bubble helpers ────────────────────────────────
function addBubble(who, text) {
  removeWelcome();
  const b = document.createElement('div');
  b.className = `bubble ${who}`;
  const sender = document.createElement('div');
  sender.className = 'sender';
  sender.textContent = who === 'user' ? 'You' : 'David';
  const msg = document.createElement('div');
  msg.textContent = text;
  b.append(sender, msg);
  chat.appendChild(b);
  chat.scrollTop = chat.scrollHeight;
  return b;
}

function showTyping() {
  if (typingBubble) return;
  removeWelcome();
  typingBubble = document.createElement('div');
  typingBubble.className = 'bubble david typing';
  typingBubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
  chat.appendChild(typingBubble);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  if (typingBubble) { typingBubble.remove(); typingBubble = null; }
}

// ── WebSocket connect/reconnect ──────────────────
function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => setStatus('Connected');

  ws.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }
    const { event, payload } = msg;

    if (event === 'status') {
      setStatus(payload);
      if (payload.toLowerCase() === 'processing') showTyping();
      else hideTyping();
    }
    else if (event === 'response' && payload) {
      hideTyping();
      addBubble('david', payload);
    }
    else if (event === 'user_input' && payload) {
      addBubble('user', payload);
    }
    else if (event === 'shutdown') {
      setStatus('Offline');
      dot.className = 'status-dot error';
    }
  };

  ws.onerror = () => setStatus('Reconnecting…');
  ws.onclose = () => {
    setStatus('Reconnecting…');
    setTimeout(connect, 2000); // auto-reconnect
  };
}

// ── Send text command ────────────────────────────
function sendText() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'text_command', text }));
  input.value = '';
}

sendBtn.addEventListener('click', sendText);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
});

// ── Mic button (Web Speech API for browser-side STT) ──
let recognition = null;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart  = () => { micBtn.classList.add('active'); setStatus('Listening…'); };
  recognition.onend    = () => { micBtn.classList.remove('active'); };
  recognition.onerror  = () => { micBtn.classList.remove('active'); };

  recognition.onresult = e => {
    const text = e.results[0][0].transcript.trim();
    if (text && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'text_command', text }));
    }
  };

  micBtn.addEventListener('click', () => {
    micBtn.classList.contains('active') ? recognition.stop() : recognition.start();
  });
} else {
  micBtn.title = 'Browser speech not supported';
  micBtn.style.opacity = '.4';
  micBtn.style.cursor  = 'not-allowed';
}

// ── Boot ─────────────────────────────────────────
connect();
</script>
</body>
</html>
